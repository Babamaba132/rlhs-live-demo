<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" role="img" aria-label="Steep pitch roof">
  <rect width="200" height="120" fill="#f3f4f6"/>
  <!-- house body -->
  <rect x="55" y="80" width="90" height="30" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- steep roof -->
  <polygon points="50,80 150,80 100,8" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <!-- door -->
  <rect x="92" y="90" width="16" height="20" fill="#9ca3af" stroke="#374151" stroke-width="1"/>
  <!-- ground -->
  <line x1="0" y1="110" x2="200" y2="110" stroke="#9ca3af" stroke-width="1.5"/>
</svg>
