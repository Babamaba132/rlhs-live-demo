<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" role="img" aria-label="Low pitch roof">
  <rect width="200" height="120" fill="#f3f4f6"/>
  <!-- house body -->
  <rect x="40" y="70" width="120" height="40" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- low roof -->
  <polygon points="35,70 165,70 150,55 50,55" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <!-- door -->
  <rect x="92" y="85" width="16" height="25" fill="#9ca3af" stroke="#374151" stroke-width="1"/>
  <!-- ground -->
  <line x1="0" y1="110" x2="200" y2="110" stroke="#9ca3af" stroke-width="1.5"/>
</svg>
